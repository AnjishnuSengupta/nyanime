services:
  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 1: AnimeKAI API Backend (Python)
  # This service handles all AnimeKAI scraping server-side to avoid CORS/rate-limit
  # Deploy this FIRST, then set ANIMEKAI_API_URL in the main nyanime service
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: animekai-api
    runtime: python
    plan: free
    rootDir: animekai_api_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANIMEKAI_URL
        value: https://anikai.to
      - key: ENCDEC_URL
        value: https://enc-dec.app/api/enc-kai
      - key: ENCDEC_DEC_KAI
        value: https://enc-dec.app/api/dec-kai
      - key: ENCDEC_DEC_MEGA
        value: https://enc-dec.app/api/dec-mega

  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 2: NyAnime Main App (Node.js)
  # IMPORTANT: This must be deployed as a "Web Service" NOT a "Static Site"
  # The Express server (server.js) handles both serving static files AND
  # proxying HLS video streams to bypass CORS restrictions.
  # 
  # If deployed as a Static Site, video streaming WILL NOT work because
  # the /stream proxy endpoint won't exist.
  #
  # To deploy correctly on Render:
  # 1. Delete any existing static site for this project
  # 2. Create a new "Web Service" (not Static Site)
  # 3. Select your repository
  # 4. Set Build Command: npm install --include=dev && npm run build
  # 5. Set Start Command: npm start
  # 6. Set Runtime: Node
  # 7. Add the environment variables listed below
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: nyanime
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # VITE_USE_DIRECT_API should be false when using web service (server handles proxy)
      - key: VITE_USE_DIRECT_API
        value: "false"
     # Firebase configuration (set these in Render dashboard with actual values)
     - key: VITE_FIREBASE_API_KEY
     sync: false
     - key: VITE_FIREBASE_AUTH_DOMAIN
     sync: false
     - key: VITE_FIREBASE_PROJECT_ID
     sync: false
     - key: VITE_FIREBASE_STORAGE_BUCKET
     sync: false
     - key: VITE_FIREBASE_MESSAGING_SENDER_ID
     sync: false
     - key: VITE_FIREBASE_APP_ID
     sync: false

      # Optional Python anipy bridge (when set, this is used as primary resolver)
      - key: ANIPY_API_URL
        sync: false
      # AnimeKAI Backend API (set this to the animekai-api service URL after deployment)
      # Format: https://animekai-api-xxxx.onrender.com
      - key: ANIMEKAI_API_URL
        sync: false
      # Node environment
      - key: NODE_ENV
        value: production
