services:
  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 0: FlareSolverr (Cloudflare Bypass)
  # Solves JS challenges by running a headless browser.
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: flaresolverr
    runtime: docker
    plan: free
    image: ghcr.io/flaresolverr/flaresolverr:latest
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: TZ
        value: UTC

  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 1: Miruro API (The Fast Path)
  # Direct decrypted access to streaming sources. Highest priority.
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: miruro-api
    runtime: python
    plan: free
    rootDir: miruro_api_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: API_KEY
        value: "default_secret_key"

  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 2: AnimeKAI API Backend (The Fallback)
  # Handles all AnimeKAI scraping server-side.
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: animekai-api
    runtime: python
    plan: free
    rootDir: animekai_api_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANIMEKAI_URL
        value: https://anikai.to
      - key: ENCDEC_URL
        value: https://enc-dec.app/api/enc-kai
      - key: ENCDEC_DEC_KAI
        value: https://enc-dec.app/api/dec-kai
      - key: ENCDEC_DEC_MEGA
        value: https://enc-dec.app/api/dec-mega
      - key: FLARESOLVERR_URL
        sync: false

  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 3: NyAnime Main App (Node.js)
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: nyanime
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: VITE_USE_DIRECT_API
        value: "false"
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: ANIPY_API_URL
        sync: false
      - key: ANIMEKAI_API_URL
        sync: false
      - key: MIRURO_API_URL
        sync: false
      - key: NODE_ENV
        value: production

